name: "qwen3-235b-a22b-vllm-agg-gb300-current-dp4-ep-dedicated-router"

slurm:
  time_limit: "02:00:00"

model:
  path: "/lustre/share/coreai_dlfw_dev/models/Qwen3-235B-A22B-Instruct-2507-FP4"
  container: "210086341041.dkr.ecr.us-west-2.amazonaws.com/ai-dynamo/dynamo:959364f561c555aa48b48717406fb056e2cdfaf6-vllm-runtime-cuda13"
  precision: "fp4"

dynamo:
  install: true
  hash: "732e31b751c1ea70c9992a3b392937baa802431f"

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false
  env:
    DYN_REQUEST_TRACE_LOGGING: "1"
    DYN_ROUTER_LOAD_BLOCK_SIZE: "1"
  args:
    router-mode: "kv"
    router-kv-overlap-score-weight: 0
    router-queue-threshold: 64
    router-temperature: 0.5
    no-kv-events: true

backend:
  type: vllm
  connector: null
  aggregated_environment:
    DYN_REQUEST_TRACE_LOGGING: "1"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
  vllm_config:
    aggregated:
      kv-cache-dtype: "fp8"
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      max-num-seqs: 864
      gpu-memory-utilization: 0.90
      quantization: "modelopt"

benchmark:
  type: "sa-bench"
  isl: 2
  osl: 1024
  concurrencies: "8192"
  random_range_ratio: 1.0
  use_chat_template: false
  request_trace: true
  metrics_scrape: true
  metrics_scrape_interval_s: 1.0
