# EP-barrier ring-vs-topology SAME-NODE control (dep-bubble, 2026-06-02).
#
# Identity arm of the permutation control. Byte-for-byte the baseline nsys recipe
# (qwen3-235b-a22b-vllm-agg-lyris-gb200-dp4-ep-round-robin-nsys.yaml, job 1977752)
# with NO SRT_DP_GPU_PERMUTATION (so dp_rank r -> physical GPU r, identity), but
# PINNED to node lyris0153 via sbatch --nodelist.
#
# Why: the reverse run (job 1987608, SRT_DP_GPU_PERMUTATION=reverse) ran on
# lyris0153, while the identity baseline (job 1977752) ran on lyris0243. That
# leaves a node confound: the dramatic identity->reverse change (one 100% ring
# leader -> no leader; END-skew 23us -> 248us) could in principle be a node effect
# rather than the dp_rank<->GPU mapping. Pinning THIS identity run to lyris0153
# gives a same-node identity-vs-reverse pair (both on 0153), isolating the mapping.
#
# Prediction (if the effect is the ring<->topology mapping, not the node): on
# lyris0153, identity reproduces the baseline signature — one rank is the ~100%
# earliest-to-END ring leader and END-skew is tight (~20-25us p50), matching
# job 1977752 and UNLIKE the diffuse, ~248us-skew reverse run on the same node.
#
# If 0153 is unavailable at submit time, fall back to a fresh same-node pair:
# pin BOTH an identity and a reverse run to one free gb200 node.

name: "qwen3-235b-a22b-vllm-agg-lyris-gb200-dp4-ep-round-robin-nsys-gpuperm-id-pin0153"

slurm:
  time_limit: "02:00:00"

# Pin to lyris0153 (the reverse run 1987608's node) to remove the node confound.
sbatch_directives:
  nodelist: "lyris0153"

model:
  path: "/lustre/share/coreai_dlfw_dev/models/Qwen3-235B-A22B-Instruct-2507-FP4"
  container: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.0"
  precision: "fp4"

dynamo:
  install: true
  hash: "c70bdbe76083e0039dccf68bb3c479ab3994a053"

# The vllm-runtime:1.1.0 (aarch64/sbsa) container ships only a DANGLING nsys
# symlink (/usr/local/cuda/bin/nsys -> .../NsightSystems-cli-2025.3.1/
# target-linux-sbsa-armv8/nsys, target stripped), and the host node has no nsys.
# Bind-mount a real staged aarch64 Nsight Systems 2025.3.2 onto the broken
# symlink's target dir so bare `nsys` resolves and runs (validated in-container).
extra_mount:
  - "/lustre/fsw/coreai_dlfw_dev/connorc/tools/nsight-systems/2025.3.2/target-linux-sbsa-armv8:/usr/local/cuda-12.9/NsightSystems-cli-2025.3.1/target-linux-sbsa-armv8"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 4

frontend:
  type: dynamo
  enable_multiple_frontends: true
  env:
    DYN_REQUEST_TRACE_LOGGING: "1"
    DYN_REQUEST_TRACE_DIR: "/logs"

backend:
  type: vllm
  connector: null
  aggregated_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    DYN_REQUEST_TRACE_LOGGING: "1"
    DYN_REQUEST_TRACE_DIR: "/logs"
  vllm_config:
    aggregated:
      kv-cache-dtype: "fp8"
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      max-num-seqs: 864
      gpu-memory-utilization: 0.90
      quantization: "modelopt"
      stream-interval: 50

profiling:
  type: nsys-time
  delay_secs: 1100
  duration_secs: 20

benchmark:
  type: "sa-bench"
  isl: 2
  osl: 1024
  concurrencies: "8192"
  random_range_ratio: 1.0
  use_chat_template: false
  request_trace: true
  metrics_scrape: true
  metrics_scrape_interval_s: 1.0
