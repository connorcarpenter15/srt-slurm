# EP-barrier ring-vs-hardware control run (dep-bubble correction, 2026-06-02).
#
# Identical to qwen3-235b-a22b-vllm-agg-lyris-gb200-dp4-ep-round-robin-nsys.yaml
# (job 1977752) EXCEPT it sets SRT_DP_GPU_PERMUTATION=reverse, which reverses the
# dp_rank -> physical-GPU mapping in the vLLM DP+EP backend:
#   dp_rank 0 -> GPU 3, dp_rank 1 -> GPU 2, dp_rank 2 -> GPU 1, dp_rank 3 -> GPU 0
# --data-parallel-rank (= NCCL ring position = nsys rank{N} file) stays sequential
# 0..3; only the backing GPU (CUDA_VISIBLE_DEVICES) permutes. This DECOUPLES ring
# position from physical GPU.
#
# Purpose: FINDINGS-2-NSYS.md's correction attributes the stable rank2-leader /
# rank3-straggler EP-barrier pattern to fixed NCCL RING completion order (a
# function of ring position), not expert-load skew or a slow GPU. Prediction:
# in this run, nsys profile `rank2` (= dp_rank 2, now on physical GPU 1) STAYS the
# 100% earliest-to-END ring leader. If instead the leader follows the physical GPU
# (GPU 2 = now dp_rank 1), a residual hardware/clock effect is implicated.
#
# The dp_rank<->GPU mapping is recorded per-worker in sweep_<job>.log
# ("--data-parallel-rank N" + "CUDA_VISIBLE_DEVICES=...").

name: "qwen3-235b-a22b-vllm-agg-lyris-gb200-dp4-ep-round-robin-nsys-gpuperm-rev"

slurm:
  time_limit: "02:00:00"

# Reverse the dp_rank -> physical-GPU mapping (orchestrator-side gate, identity
# unless set). Reaches the do_sweep orchestrator via config.environment.
environment:
  SRT_DP_GPU_PERMUTATION: "reverse"

model:
  path: "/lustre/share/coreai_dlfw_dev/models/Qwen3-235B-A22B-Instruct-2507-FP4"
  container: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.0"
  precision: "fp4"

dynamo:
  install: true
  hash: "c70bdbe76083e0039dccf68bb3c479ab3994a053"

# The vllm-runtime:1.1.0 (aarch64/sbsa) container ships only a DANGLING nsys
# symlink (/usr/local/cuda/bin/nsys -> .../NsightSystems-cli-2025.3.1/
# target-linux-sbsa-armv8/nsys, target stripped), and the host node has no nsys.
# Bind-mount a real staged aarch64 Nsight Systems 2025.3.2 onto the broken
# symlink's target dir so bare `nsys` resolves and runs (validated in-container).
extra_mount:
  - "/lustre/fsw/coreai_dlfw_dev/connorc/tools/nsight-systems/2025.3.2/target-linux-sbsa-armv8:/usr/local/cuda-12.9/NsightSystems-cli-2025.3.1/target-linux-sbsa-armv8"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 4

frontend:
  type: dynamo
  enable_multiple_frontends: true
  env:
    DYN_REQUEST_TRACE_LOGGING: "1"
    DYN_REQUEST_TRACE_DIR: "/logs"

backend:
  type: vllm
  connector: null
  aggregated_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    DYN_REQUEST_TRACE_LOGGING: "1"
    DYN_REQUEST_TRACE_DIR: "/logs"
  vllm_config:
    aggregated:
      kv-cache-dtype: "fp8"
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      max-num-seqs: 864
      gpu-memory-utilization: 0.90
      quantization: "modelopt"
      stream-interval: 50

profiling:
  type: nsys-time
  delay_secs: 1100
  duration_secs: 20

benchmark:
  type: "sa-bench"
  isl: 2
  osl: 1024
  concurrencies: "8192"
  random_range_ratio: 1.0
  use_chat_template: false
  request_trace: true
  metrics_scrape: true
  metrics_scrape_interval_s: 1.0
