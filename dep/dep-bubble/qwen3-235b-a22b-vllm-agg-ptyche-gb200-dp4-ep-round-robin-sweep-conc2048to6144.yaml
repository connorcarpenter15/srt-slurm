# Concurrency sweep (dep-bubble, ptyche, 2026-06-05) — does temporal skew cost throughput?
#
# The drain result (job 2188160/2188338) is a VISIBILITY result: at concurrency
# 2048 the queue drains (Running ~512 < 864 cap, Waiting=0) and macro running_skew
# reaches 89, but there is so much slack (254 ms median TTFT) that the skew costs
# no throughput. This sweep asks the performance question directly: is there a
# concurrency where the queue STILL drains (Waiting ~ 0) but the system is
# throughput-bound, so the temporal skew actually costs tok/s?
#
# Total per-rank running capacity = 4 ranks x max-num-seqs 864 = 3456. So:
#   conc 2048 -> ~512/rank  (drains, big slack)            [already have: 2188160]
#   conc 3072 -> ~768/rank  (drains, near cap)
#   conc 4096 -> ~1024/rank (just over cap -> running pins 864, light Waiting)
#   conc 6144 -> ~1536/rank (saturated, Waiting ~672/rank)
#   conc 8192 -> fully saturated                            [companion: saturated-conc8192-nsys]
# The knee where adding concurrency stops lifting throughput — while Waiting is
# still ~0 — is where the temporal underfeed bites.
#
# Single job, ONE node: all points share the same physical node, so the
# throughput-vs-concurrency curve and per-point running_skew are confound-free.
# No nsys (macro only): signal is backend_log_summary running/waiting skew +
# benchmark-rollup throughput per point. num_prompts_mult=5 keeps each point long
# enough to reach steady state (~70-110 Engine-log samples) but short enough that
# 4 points fit the 2 h limit; num_warmup_mult=1 trims warmup.

name: "qwen3-235b-a22b-vllm-agg-ptyche-gb200-dp4-ep-round-robin-sweep-conc2048to6144"

slurm:
  account: "coreai_dlfw_dev"
  partition: "batch"
  time_limit: "02:00:00"

model:
  path: "/lustre/fsw/coreai_dlfw_dev/connorc/models/Qwen3-235B-A22B-Instruct-2507-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.0"
  precision: "fp4"

dynamo:
  install: true
  hash: "c70bdbe76083e0039dccf68bb3c479ab3994a053"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 4

frontend:
  type: dynamo
  enable_multiple_frontends: true
  env:
    DYN_REQUEST_TRACE_LOGGING: "1"
    DYN_REQUEST_TRACE_DIR: "/logs"

backend:
  type: vllm
  connector: null
  aggregated_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    DYN_REQUEST_TRACE_LOGGING: "1"
    DYN_REQUEST_TRACE_DIR: "/logs"
  vllm_config:
    aggregated:
      kv-cache-dtype: "fp8"
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      no-enable-prefix-caching: true
      max-model-len: 2048
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048
      max-num-seqs: 864
      gpu-memory-utilization: 0.90
      quantization: "modelopt"
      stream-interval: 50

benchmark:
  type: "sa-bench"
  isl: 2
  osl: 1024
  concurrencies: "2048x3072x4096x6144"
  num_prompts_mult: 5
  num_warmup_mult: 1
  random_range_ratio: 1.0
  use_chat_template: false
  request_trace: true
  metrics_scrape: true
  metrics_scrape_interval_s: 1.0
